
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{max-width:420px;margin:0 auto;padding:1rem 0.75rem;display:flex;flex-direction:column;align-items:center;gap:0.9rem;font-family:var(--font-sans)}
#hdr{width:100%;display:flex;justify-content:space-between;align-items:flex-start}
#lname{font-size:17px;font-weight:500;color:var(--color-text-primary)}
#ldots{display:flex;gap:4px;margin-top:5px}
.ld{width:5px;height:5px;border-radius:50%;background:var(--color-border-secondary)}
.ld.done{background:var(--color-text-primary)}.ld.cur{background:var(--color-text-secondary);transform:scale(1.3)}
#hint{font-size:12px;color:var(--color-text-tertiary);text-align:right;max-width:60%;line-height:1.4}
#gw{background:#0a0a14;border-radius:6px;padding:3px;border:0.5px solid #2a2a40}
#grid{display:grid;grid-template-columns:repeat(6,54px);grid-template-rows:repeat(6,54px);gap:2px;background:#0a0a14}
.cell{width:54px;height:54px;position:relative;border-radius:3px;background:#111126;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s,filter .1s}
.cell:hover:not(.wall):not(.no-tap){filter:brightness(1.2)}
.cell.wall{background:#1a1a2c;cursor:default}
.cell.wall::before{content:'';position:absolute;inset:0;border-radius:3px;background:repeating-linear-gradient(45deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 1px,transparent 1px,transparent 7px)}
.cell.no-tap{cursor:default}
.lant{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.9);position:relative;z-index:2;flex-shrink:0}
.lant.given{border-color:rgba(255,220,80,.95);box-shadow:0 0 0 1px rgba(255,220,80,.3)}
.tind{position:absolute;bottom:4px;right:4px;width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.7);z-index:3}
.tmet{position:absolute;bottom:3px;right:3px;width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.15);z-index:3;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff}
#palette{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.pb{padding:6px 13px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--color-text-primary);transition:all .15s}
.pb:disabled{opacity:.25;cursor:default}
.pb.sel{border-color:var(--color-text-primary);background:var(--color-background-secondary)}
.pb .pd{width:11px;height:11px;border-radius:50%;flex-shrink:0}
#ctrls{display:flex;gap:7px}
#ctrls button{padding:6px 16px;border-radius:var(--border-radius-md);font-size:12px;cursor:pointer;transition:all .15s;font-weight:500}
#rb{background:transparent;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary)}
#rb:hover{background:var(--color-background-secondary)}
#res{display:none;flex-direction:column;align-items:center;gap:9px;animation:fi .3s}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
#rmsg{font-size:15px;font-weight:500;color:var(--color-text-primary)}
#rsub{font-size:12px;color:var(--color-text-secondary)}
.rbx{display:flex;gap:7px}
.rbx button{padding:6px 14px;border-radius:var(--border-radius-md);font-size:12px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary)}
.rbx button:hover{background:var(--color-background-secondary)}
.rbx button.pr{background:var(--color-text-primary)!important;color:var(--color-background-primary)!important;border:none!important}
#legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-tertiary)}
.leg-dot{width:8px;height:8px;border-radius:50%}
</style>
<h2 class="sr-only">LANTERN — color mixing light puzzle. Each lantern illuminates its row and column. Where two colors cross, they mix. Match the target color shown in each marked cell.</h2>
<div id="app">
  <div id="hdr">
    <div><div id="lname">Spark</div><div id="ldots"></div></div>
    <div id="hint">Place your lantern so its light reaches the target.</div>
  </div>
  <div id="gw"><div id="grid"></div></div>
  <div id="legend">
    <div class="leg"><div class="leg-dot" style="background:#FF3B3B"></div>Red</div>
    <div class="leg"><div class="leg-dot" style="background:#2B7FFF"></div>Blue</div>
    <div class="leg"><div class="leg-dot" style="background:#FFD60A"></div>Yellow</div>
    <div class="leg"><div class="leg-dot" style="background:#9B59F0"></div>Purple</div>
    <div class="leg"><div class="leg-dot" style="background:#FF8C00"></div>Orange</div>
    <div class="leg"><div class="leg-dot" style="background:#30D158"></div>Green</div>
  </div>
  <div id="palette"></div>
  <div id="ctrls"><button id="rb">Reset</button></div>
  <div id="res"><div id="rmsg"></div><div id="rsub"></div><div class="rbx" id="rbx"></div></div>
</div>
<script>
const SZ=6;
const CH={R:'#FF3B3B',B:'#2B7FFF',Y:'#FFD60A'};
const MX={'R':'#FF3B3B','B':'#2B7FFF','Y':'#FFD60A','BR':'#9B59F0','RY':'#FF8C00','BY':'#30D158','BRY':'#F5F5F5'};
function mkey(s){return[...s].sort().join('')}
function mhex(s){return MX[mkey(s)]||'#888'}

const LEVELS=[
  {name:'Spark',hint:'Each lantern lights its whole row and column.',
   given:[],palette:{R:1},walls:[],
   targets:[{r:2,c:2,need:['R']}]},
  {name:'Cross',hint:'Two colors crossing creates a third. Find where they meet.',
   given:[],palette:{R:1,B:1},walls:[],
   targets:[{r:2,c:0,need:['R']},{r:0,c:2,need:['B']},{r:2,c:2,need:['R','B']}]},
  {name:'Prism',hint:'Three colors, five targets. The crosses are the key.',
   given:[],palette:{R:1,B:1,Y:1},walls:[],
   targets:[{r:0,c:1,need:['R']},{r:1,c:4,need:['B']},{r:4,c:2,need:['Y']},{r:0,c:4,need:['R','B']},{r:4,c:1,need:['R','Y']}]},
  {name:'Constellation',hint:'Plan which rows and columns each color should occupy.',
   given:[],palette:{R:1,B:1,Y:1},walls:[],
   targets:[{r:0,c:1,need:['R']},{r:3,c:0,need:['B']},{r:2,c:1,need:['Y']},{r:0,c:0,need:['R','B']},{r:0,c:5,need:['R','Y']}]},
  {name:'Eclipse',hint:'The red lantern is fixed. Place blue and yellow to complete the picture.',
   given:[{r:2,c:2,color:'R'}],palette:{B:1,Y:1},walls:[],
   targets:[{r:2,c:4,need:['R']},{r:0,c:2,need:['R']},{r:4,c:1,need:['B']},{r:1,c:5,need:['Y']},{r:2,c:5,need:['R','Y']},{r:4,c:2,need:['R','B']}]}
];

let lv=0,placed=[],sel=null,remCount={};

function initLevel(i){
  lv=i;placed=[];sel=null;
  const L=LEVELS[i];
  remCount={};
  for(const[c,n]of Object.entries(L.palette)) remCount[c]=n;
  document.getElementById('res').style.display='none';
  render();
}

function computeLight(){
  const L=LEVELS[lv];
  const light=Array.from({length:SZ},()=>Array.from({length:SZ},()=>new Set()));
  const wallSet=new Set(L.walls.map(([r,c])=>`${r},${c}`));
  const all=[...L.given,...placed];
  for(const{r,c,color}of all){
    // row left
    for(let cc=c;cc>=0;cc--){if(wallSet.has(`${r},${cc}`))break;light[r][cc].add(color)}
    // row right
    for(let cc=c;cc<SZ;cc++){if(wallSet.has(`${r},${cc}`))break;light[r][cc].add(color)}
    // col up
    for(let rr=r;rr>=0;rr--){if(wallSet.has(`${rr},${c}`))break;light[rr][c].add(color)}
    // col down
    for(let rr=r;rr<SZ;rr++){if(wallSet.has(`${rr},${c}`))break;light[rr][c].add(color)}
  }
  return light;
}

function checkWin(light){
  const L=LEVELS[lv];
  for(const t of L.targets){
    const cell=light[t.r][t.c];
    if(mkey(cell)!==mkey(new Set(t.need)))return false;
  }
  return true;
}

function render(){
  const L=LEVELS[lv];
  document.getElementById('lname').textContent=L.name;
  document.getElementById('hint').textContent=L.hint;
  document.getElementById('ldots').innerHTML=LEVELS.map((_,i)=>`<div class="ld ${i<lv?'done':i===lv?'cur':''}"></div>`).join('');

  const wallSet=new Set(L.walls.map(([r,c])=>`${r},${c}`));
  const givenSet=new Set(L.given.map(({r,c})=>`${r},${c}`));
  const placedMap=new Map(placed.map(({r,c,color})=>[`${r},${c}`,color]));
  const targetMap=new Map(L.targets.map(t=>[`${t.r},${t.c}`,t]));
  const light=computeLight();

  const won=checkWin(light);

  const gEl=document.getElementById('grid');
  gEl.innerHTML='';
  for(let r=0;r<SZ;r++){
    for(let c=0;c<SZ;c++){
      const key=`${r},${c}`;
      const isWall=wallSet.has(key);
      const isGiven=givenSet.has(key);
      const placedColor=placedMap.get(key);
      const target=targetMap.get(key);
      const cellLight=light[r][c];
      const isLit=cellLight.size>0;
      const litHex=isLit?mhex(cellLight):null;

      const d=document.createElement('div');
      d.className='cell'+(isWall?' wall':'')+((!isWall&&!won)?' ':' no-tap');
      if(isWall)d.classList.add('no-tap');
      if(isLit&&!isWall)d.style.background=litHex;

      // lantern icon
      if(isGiven||placedColor){
        const col=isGiven?L.given.find(g=>g.r===r&&g.c===c).color:placedColor;
        const dk=document.createElement('div');
        dk.className='lant'+(isGiven?' given':'');
        dk.style.background=CH[col];
        d.appendChild(dk);
      }

      // target indicator
      if(target){
        const tColor=mhex(new Set(target.need));
        const met=mkey(cellLight)===mkey(new Set(target.need));
        if(met){
          const tm=document.createElement('div');
          tm.className='tmet';
          tm.textContent='✓';
          d.appendChild(tm);
        } else {
          const ti=document.createElement('div');
          ti.className='tind';
          ti.style.background=tColor;
          d.appendChild(ti);
        }
      }

      // click handler
      d.addEventListener('click',()=>cellClick(r,c,isWall,isGiven,placedColor,!!won));
      gEl.appendChild(d);
    }
  }

  // palette
  const palEl=document.getElementById('palette');
  palEl.innerHTML='';
  for(const[color,_]of Object.entries(L.palette)){
    const avail=remCount[color]||0;
    const b=document.createElement('button');
    b.className='pb'+(sel===color?' sel':'');
    b.disabled=avail<=0&&sel!==color;
    const pd=document.createElement('div');pd.className='pd';pd.style.background=CH[color];
    b.appendChild(pd);
    b.appendChild(document.createTextNode(`${color==='R'?'Red':color==='B'?'Blue':'Yellow'} × ${avail}`));
    b.addEventListener('click',()=>{sel=sel===color?null:color;render();});
    palEl.appendChild(b);
  }

  // win/fail
  if(won){
    const res=document.getElementById('res');
    res.style.display='flex';
    document.getElementById('rmsg').textContent='✓ All lights aligned';
    document.getElementById('rsub').textContent=lv<LEVELS.length-1?'The pattern is complete.':'You\'ve mastered all levels.';
    const rbx=document.getElementById('rbx');
    rbx.innerHTML='';
    if(lv<LEVELS.length-1){
      const nb=document.createElement('button');nb.className='pr';nb.textContent='Next level →';
      nb.onclick=()=>initLevel(lv+1);rbx.appendChild(nb);
    } else {
      const rb2=document.createElement('button');rb2.textContent='Play again';
      rb2.onclick=()=>initLevel(0);rbx.appendChild(rb2);
    }
  }
}

function cellClick(r,c,isWall,isGiven,placedColor,won){
  if(won||isWall||isGiven)return;
  const key=`${r},${c}`;

  if(placedColor){
    // remove placed lantern
    placed=placed.filter(p=>!(p.r===r&&p.c===c));
    remCount[placedColor]=(remCount[placedColor]||0)+1;
    render();
    return;
  }

  if(!sel)return;
  if((remCount[sel]||0)<=0)return;

  placed.push({r,c,color:sel});
  remCount[sel]--;
  if(remCount[sel]===0)sel=null;
  render();
}

document.getElementById('rb').onclick=()=>initLevel(lv);
initLevel(0);
</script>
