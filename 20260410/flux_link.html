<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flux Link: 5 Levels</title>
    <style>
        body { margin: 0; background: #0a0a12; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #game-container { position: relative; width: 100%; max-width: 400px; height: 75vh; }
        canvas { background: #11111d; border-radius: 15px; box-shadow: 0 0 30px rgba(0, 255, 255, 0.1); touch-action: none; width: 100%; height: 100%; }
        .ui { text-align: center; margin-bottom: 10px; width: 100%; }
        .stats { display: flex; justify-content: space-around; font-weight: bold; color: #00ffff; text-transform: uppercase; letter-spacing: 2px; }
        #msg { margin-top: 10px; height: 20px; color: #ff00ff; font-size: 0.8em; }
        .btn { background: none; border: 1px solid #00ffff; color: #00ffff; padding: 5px 15px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="ui">
        <div class="stats">
            <div>LVL: <span id="lvl-num">1</span></div>
            <div>TAPS: <span id="taps-num">1</span></div>
        </div>
        <div id="msg">PREPARE THE LINKS</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <button class="btn" onclick="resetLevel()">RESTART LEVEL</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const lvlDisp = document.getElementById('lvl-num');
const tapsDisp = document.getElementById('taps-num');
const msgDisp = document.getElementById('msg');

let width, height;
let nodes = [];
let pulses = [];
let currentLevel = 0;
let tapsLeft = 1;
let gameStarted = false;
let levelComplete = false;

// Node Types: 0: Normal, 1: Splitter (2-way), 2: Rotator (Changeable)
class Node {
    constructor(xPerc, yPerc, dir, type = 0) {
        this.xPerc = xPerc;
        this.yPerc = yPerc;
        this.x = 0; // Calculated on resize
        this.y = 0;
        this.dir = dir; 
        this.type = type;
        this.radius = 20;
        this.activated = false;
        this.pulseAnim = 0;
    }

    updatePos(w, h) {
        this.x = w * this.xPerc;
        this.y = h * this.yPerc;
    }

    draw() {
        let color = "#00ffff";
        if (this.type === 1) color = "#ff00ff"; // Splitter
        if (this.type === 2) color = "#ffff00"; // Rotator

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.strokeStyle = this.activated ? '#fff' : color;
        ctx.lineWidth = this.activated ? 4 : 2;
        ctx.stroke();

        // Draw Direction Arrows
        this.drawArrow(this.dir, color);
        if (this.type === 1) this.drawArrow((this.dir + 2) % 4, color);

        if (this.activated && this.pulseAnim < 1) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius + (this.pulseAnim * 20), 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255,255,255,${1 - this.pulseAnim})`;
            ctx.stroke();
            this.pulseAnim += 0.05;
        }
    }

    drawArrow(d, col) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(d * Math.PI / 2);
        ctx.beginPath();
        ctx.moveTo(0, -10); ctx.lineTo(6, 0); ctx.lineTo(-6, 0);
        ctx.closePath();
        ctx.fillStyle = this.activated ? '#fff' : col;
        ctx.fill();
        ctx.restore();
    }

    activate() {
        if (this.activated) return;
        this.activated = true;
        pulses.push(new Pulse(this.x, this.y, this.dir));
        if (this.type === 1) pulses.push(new Pulse(this.x, this.y, (this.dir + 2) % 4));
    }
}

class Pulse {
    constructor(x, y, dir) {
        this.x = x; this.y = y; this.dir = dir;
        this.speed = 10;
        this.active = true;
    }
    update() {
        if (this.dir === 0) this.y -= this.speed;
        if (this.dir === 1) this.x += this.speed;
        if (this.dir === 2) this.y += this.speed;
        if (this.dir === 3) this.x -= this.speed;

        if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.active = false;

        nodes.forEach(n => {
            if (!n.activated) {
                let d = Math.hypot(this.x - n.x, this.y - n.y);
                if (d < n.radius) { n.activate(); this.active = false; }
            }
        });
    }
    draw() {
        ctx.fillStyle = "#fff";
        ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff";
        ctx.beginPath();
        ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

const levelData = [
    { // Lvl 1: Introduction
        taps: 1,
        nodes: [
            {x: 0.5, y: 0.2, d: 2, t: 0},
            {x: 0.5, y: 0.5, d: 2, t: 0},
            {x: 0.5, y: 0.8, d: 0, t: 0}
        ]
    },
    { // Lvl 2: The Splitter
        taps: 1,
        nodes: [
            {x: 0.5, y: 0.5, d: 1, t: 1}, // Center Splitter
            {x: 0.2, y: 0.5, d: 0, t: 0},
            {x: 0.8, y: 0.5, d: 0, t: 0}
        ]
    },
    { // Lvl 3: The Rotator (Prep needed)
        taps: 1,
        nodes: [
            {x: 0.5, y: 0.2, d: 2, t: 0},
            {x: 0.5, y: 0.5, d: 0, t: 2}, // Rotator
            {x: 0.8, y: 0.5, d: 0, t: 0}
        ]
    },
    { // Lvl 4: Divergent Paths
        taps: 1,
        nodes: [
            {x: 0.2, y: 0.2, d: 1, t: 0},
            {x: 0.5, y: 0.2, d: 2, t: 1}, // Split down/up
            {x: 0.8, y: 0.2, d: 3, t: 0},
            {x: 0.5, y: 0.5, d: 1, t: 2}, // Rotator in middle
            {x: 0.8, y: 0.5, d: 0, t: 0}
        ]
    },
    { // Lvl 5: The Circuit
        taps: 1,
        nodes: [
            {x: 0.5, y: 0.1, d: 1, t: 1},
            {x: 0.8, y: 0.1, d: 2, t: 0},
            {x: 0.2, y: 0.1, d: 2, t: 0},
            {x: 0.8, y: 0.5, d: 3, t: 2}, // Rotator
            {x: 0.2, y: 0.5, d: 1, t: 2}, // Rotator
            {x: 0.5, y: 0.8, d: 0, t: 1},
            {x: 0.2, y: 0.8, d: 0, t: 0},
            {x: 0.8, y: 0.8, d: 0, t: 0}
        ]
    }
];

function initLevel() {
    const data = levelData[currentLevel];
    nodes = data.nodes.map(n => new Node(n.x, n.y, n.d, n.t));
    tapsLeft = data.taps;
    gameStarted = false;
    levelComplete = false;
    pulses = [];
    resize();
    lvlDisp.innerText = currentLevel + 1;
    tapsDisp.innerText = tapsLeft;
    msgDisp.innerText = "CONFIGURE ROTATORS & TAP TO START";
}

function resetLevel() { initLevel(); }

function resize() {
    width = canvas.parentElement.clientWidth;
    height = canvas.parentElement.clientHeight;
    canvas.width = width; canvas.height = height;
    nodes.forEach(n => n.updatePos(width, height));
}

function update() {
    ctx.fillStyle = '#11111d';
    ctx.fillRect(0, 0, width, height);

    pulses.forEach((p, i) => {
        p.update(); p.draw();
        if (!p.active) pulses.splice(i, 1);
    });

    nodes.forEach(n => n.draw());

    if (gameStarted && pulses.length === 0 && !levelComplete) {
        const win = nodes.every(n => n.activated);
        if (win) {
            levelComplete = true;
            msgDisp.innerText = "SUCCESS! NEXT LEVEL IN 2S";
            setTimeout(() => {
                if (currentLevel < levelData.length - 1) {
                    currentLevel++; initLevel();
                } else {
                    msgDisp.innerText = "ALL SYSTEMS ONLINE. YOU WIN!";
                }
            }, 2000);
        } else {
            msgDisp.innerText = "CONNECTION FAILED. RESTARTING...";
            setTimeout(resetLevel, 1500);
        }
    }
    requestAnimationFrame(update);
}

canvas.addEventListener('pointerdown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    nodes.forEach(n => {
        if (Math.hypot(mx - n.x, my - n.y) < n.radius) {
            if (!gameStarted) {
                if (n.type === 2) {
                    n.dir = (n.dir + 1) % 4; // Rotate yellow nodes
                } else if (tapsLeft > 0) {
                    n.activate();
                    tapsLeft--;
                    tapsDisp.innerText = tapsLeft;
                    gameStarted = true;
                    msgDisp.innerText = "FLUX ACTIVE...";
                }
            }
        }
    });
});

window.addEventListener('resize', resize);
initLevel();
update();
</script>
</body>
</html>
