<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ring Cascade - Hyper Casual Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        #gameArea {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
        }

        /* UI Elements */
        #uiTop {
            position: absolute;
            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            z-index: 100;
            border-bottom: 2px solid #667eea;
        }

        #score, #timer {
            color: #00ff88;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
        }

        #level {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 5px #ffd700;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            user-select: none;
        }

        .ring.falling {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0px rgba(255, 255, 255, 0.7);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(255, 255, 255, 0);
            }
        }

        .ring.matched {
            animation: pop 0.4s ease-out forwards;
        }

        .ring.highlight {
            animation: pulse 0.6s infinite;
        }

        /* Platform */
        #platform {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 15px;
            background: linear-gradient(90deg, #00ff88, #00cc6a);
            border-radius: 10px;
            cursor: grab;
            z-index: 50;
            box-shadow: 0 0 20px #00ff88;
            transition: transform 0.1s ease-out;
        }

        #platform:active {
            cursor: grabbing;
        }

        /* Buttons */
        #uiBottom {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border-top: 2px solid #667eea;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #rotateBtn {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            flex: 1;
            max-width: 100px;
        }

        #rotateBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff4757;
        }

        #rotateBtn:active {
            transform: scale(0.95);
        }

        #pauseBtn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        #pauseBtn:hover {
            box-shadow: 0 0 15px #ffaa00;
        }

        /* Game Over Screen */
        #gameOverScreen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #gameOverScreen.show {
            display: flex;
        }

        #gameOverScreen h1 {
            color: #00ff88;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff88;
        }

        #gameOverScreen p {
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ffd700;
        }

        #restartBtn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: black;
            font-weight: bold;
        }

        #restartBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #00ff88;
        }

        /* Pause Screen */
        #pauseScreen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 150;
        }

        #pauseScreen.show {
            display: flex;
        }

        #pauseScreen h2 {
            color: #ffd700;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px #ffd700;
        }

        #resumeBtn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: black;
            font-weight: bold;
            margin-bottom: 15px;
        }

        #resumeBtn:hover {
            transform: scale(1.05);
        }

        /* Combo Text */
        .comboText {
            position: absolute;
            color: #ff6b6b;
            font-weight: bold;
            font-size: 24px;
            text-shadow: 0 0 10px #ff6b6b;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            from {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            to {
                transform: translateY(-50px) scale(0.5);
                opacity: 0;
            }
        }

        /* Mobile Touch */
        @media (max-width: 480px) {
            #gameContainer {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }

            #uiTop, #uiBottom {
                height: 50px;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="gameArea">
            <!-- UI Top -->
            <div id="uiTop">
                <div>
                    <div id="score">Score: 0</div>
                    <div id="level">Level 1</div>
                </div>
                <div id="timer">60</div>
            </div>

            <!-- Game Area -->
            <!-- Rings and platform will be added dynamically -->
            <div id="platform"></div>

            <!-- UI Bottom -->
            <div id="uiBottom">
                <button id="rotateBtn">ROTATE</button>
                <button id="pauseBtn">⏸</button>
            </div>

            <!-- Game Over Screen -->
            <div id="gameOverScreen">
                <h1>GAME OVER</h1>
                <p id="finalScore">Score: 0</p>
                <p id="levelReached">Level 1</p>
                <button id="restartBtn">PLAY AGAIN</button>
            </div>

            <!-- Pause Screen -->
            <div id="pauseScreen">
                <h2>PAUSED</h2>
                <button id="resumeBtn">RESUME</button>
                <button id="restartBtn2">RESTART</button>
            </div>
        </div>
    </div>

    <script>
        // Game Constants
        const GAME_WIDTH = 400;
        const GAME_HEIGHT = 600;
        const RING_SIZE = 40;
        const GAME_DURATION = 60;
        const SPAWN_RATE = 0.6;
        const PLATFORM_Y = GAME_HEIGHT - 70;

        // Game State
        let gameState = {
            score: 0,
            level: 1,
            timeLeft: GAME_DURATION,
            gameActive: true,
            paused: false,
            rings: [],
            platform: { x: GAME_WIDTH / 2, width: 80 },
            spawnCounter: 0,
            combo: 0,
            comboDecayTimer: 0
        };

        // Colors for rings
        const COLORS = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#FF8FB1', '#A8E6CF'];
        const COLOR_NAMES = {
            '#FF6B6B': 'red',
            '#4ECDC4': 'teal',
            '#FFE66D': 'yellow',
            '#95E1D3': 'mint',
            '#FF8FB1': 'pink',
            '#A8E6CF': 'green'
        };

        // DOM Elements
        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const timerDisplay = document.getElementById('timer');
        const platform = document.getElementById('platform');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const pauseScreen = document.getElementById('pauseScreen');
        const rotateBtn = document.getElementById('rotateBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const restartBtn2 = document.getElementById('restartBtn2');
        const resumeBtn = document.getElementById('resumeBtn');
        const finalScoreDisplay = document.getElementById('finalScore');
        const levelReachedDisplay = document.getElementById('levelReached');

        // Create a ring element
        function createRingElement(color, x, y) {
            const ring = document.createElement('div');
            ring.className = 'ring falling';
            ring.style.width = RING_SIZE + 'px';
            ring.style.height = RING_SIZE + 'px';
            ring.style.left = x + 'px';
            ring.style.top = y + 'px';
            ring.style.background = `radial-gradient(circle at 30% 30%, ${color}, ${darkenColor(color)})`;
            ring.style.border = `3px solid ${lightenColor(color)}`;
            ring.style.boxShadow = `0 0 15px ${color}`;
            return ring;
        }

        function darkenColor(color) {
            const hex = color.replace('#', '');
            const r = Math.max(0, parseInt(hex.substr(0, 2), 16) - 40);
            const g = Math.max(0, parseInt(hex.substr(2, 2), 16) - 40);
            const b = Math.max(0, parseInt(hex.substr(4, 2), 16) - 40);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function lightenColor(color) {
            const hex = color.replace('#', '');
            const r = Math.min(255, parseInt(hex.substr(0, 2), 16) + 40);
            const g = Math.min(255, parseInt(hex.substr(2, 2), 16) + 40);
            const b = Math.min(255, parseInt(hex.substr(4, 2), 16) + 40);
            return `rgb(${r}, ${g}, ${b})`;
        }

        // Add a new ring to the game
        function spawnRing() {
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];
            const x = Math.random() * (GAME_WIDTH - RING_SIZE);
            const ring = {
                x: x,
                y: -RING_SIZE,
                vx: 0,
                vy: 2 + gameState.level * 0.3,
                color: color,
                matched: false,
                element: null
            };

            ring.element = createRingElement(color, ring.x, ring.y);
            gameArea.insertBefore(ring.element, platform);
            gameState.rings.push(ring);
        }

        // Update rings positions
        function updateRings() {
            for (let i = gameState.rings.length - 1; i >= 0; i--) {
                const ring = gameState.rings[i];

                if (ring.matched) {
                    if (ring.element && ring.element.parentNode) {
                        ring.element.remove();
                    }
                    gameState.rings.splice(i, 1);
                    continue;
                }

                ring.y += ring.vy;
                ring.x += ring.vx;

                // Bounce off walls
                if (ring.x < 0) {
                    ring.x = 0;
                    ring.vx *= -0.8;
                } else if (ring.x + RING_SIZE > GAME_WIDTH) {
                    ring.x = GAME_WIDTH - RING_SIZE;
                    ring.vx *= -0.8;
                }

                // Apply gravity
                ring.vy += 0.1;

                if (ring.element) {
                    ring.element.style.left = ring.x + 'px';
                    ring.element.style.top = ring.y + 'px';
                }

                // Check if ring reached bottom (failed to catch)
                if (ring.y > GAME_HEIGHT) {
                    if (ring.element && ring.element.parentNode) {
                        ring.element.remove();
                    }
                    gameState.rings.splice(i, 1);
                }
            }
        }

        // Check for matches when ring lands on platform
        function checkMatches() {
            let matches = [];

            for (let i = 0; i < gameState.rings.length; i++) {
                const ring = gameState.rings[i];
                if (ring.matched) continue;

                // Check if ring is on platform
                if (ring.y + RING_SIZE >= PLATFORM_Y && ring.y < GAME_HEIGHT) {
                    if (ring.x + RING_SIZE > gameState.platform.x && ring.x < gameState.platform.x + gameState.platform.width) {
                        // Ring landed on platform
                        ring.vy = -5; // Bounce effect
                        ring.vx = (Math.random() - 0.5) * 4;

                        // Check for nearby matches
                        const matchedIndices = findMatchingRings(i);
                        if (matchedIndices.length >= 2) {
                            matches.push(...matchedIndices);
                        }
                    }
                }
            }

            if (matches.length > 0) {
                removeMatches(matches);
                gameState.combo++;
                gameState.comboDecayTimer = 30;
            } else {
                gameState.combo = 0;
            }
        }

        function findMatchingRings(ringIndex) {
            const ring = gameState.rings[ringIndex];
            const matchedRings = [ringIndex];
            const visited = new Set([ringIndex]);

            function dfs(idx) {
                const current = gameState.rings[idx];
                for (let i = 0; i < gameState.rings.length; i++) {
                    if (visited.has(i) || gameState.rings[i].matched) continue;

                    const other = gameState.rings[i];
                    const dist = Math.hypot(current.x - other.x, current.y - other.y);

                    if (other.color === current.color && dist < RING_SIZE * 2) {
                        visited.add(i);
                        matchedRings.push(i);
                        dfs(i);
                    }
                }
            }

            dfs(ringIndex);
            return matchedRings;
        }

        function removeMatches(indices) {
            const basePoints = 100;
            const comboMultiplier = Math.min(gameState.combo, 5);
            const matchBonus = indices.length * 50;
            const points = (basePoints + matchBonus) * comboMultiplier;

            gameState.score += points;

            for (const idx of indices) {
                gameState.rings[idx].matched = true;
                gameState.rings[idx].element.classList.add('matched');

                // Show combo text
                if (gameState.combo > 1) {
                    const comboText = document.createElement('div');
                    comboText.className = 'comboText';
                    comboText.textContent = `${gameState.combo}x COMBO!`;
                    comboText.style.left = gameState.rings[idx].x + 'px';
                    comboText.style.top = gameState.rings[idx].y + 'px';
                    gameArea.appendChild(comboText);

                    setTimeout(() => comboText.remove(), 800);
                }
            }

            updateLevel();
        }

        function updateLevel() {
            const newLevel = Math.floor(gameState.score / 500) + 1;
            if (newLevel !== gameState.level) {
                gameState.level = newLevel;
                levelDisplay.textContent = `Level ${gameState.level}`;
            }
        }

        // Platform control
        let isDragging = false;
        let dragStartX = 0;

        platform.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStartX = e.clientX;
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging && gameState.gameActive && !gameState.paused) {
                const delta = e.clientX - dragStartX;
                gameState.platform.x += delta * 0.5;
                gameState.platform.x = Math.max(0, Math.min(GAME_WIDTH - gameState.platform.width, gameState.platform.x));
                platform.style.left = gameState.platform.x + 'px';
                dragStartX = e.clientX;
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Touch support
        platform.addEventListener('touchstart', (e) => {
            isDragging = true;
            dragStartX = e.touches[0].clientX;
        });

        document.addEventListener('touchmove', (e) => {
            if (isDragging && gameState.gameActive && !gameState.paused) {
                const delta = e.touches[0].clientX - dragStartX;
                gameState.platform.x += delta * 0.5;
                gameState.platform.x = Math.max(0, Math.min(GAME_WIDTH - gameState.platform.width, gameState.platform.x));
                platform.style.left = gameState.platform.x + 'px';
                dragStartX = e.touches[0].clientX;
            }
        });

        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Rotate button (gravity toggle effect)
        rotateBtn.addEventListener('click', () => {
            if (!gameState.gameActive || gameState.paused) return;

            for (const ring of gameState.rings) {
                if (!ring.matched) {
                    // Create spinning effect
                    ring.vx += (Math.random() - 0.5) * 8;
                    ring.vy -= 3;
                }
            }

            gameState.score += 50;
            updateLevel();
        });

        // Pause/Resume
        pauseBtn.addEventListener('click', () => {
            if (!gameState.gameActive) return;
            gameState.paused = !gameState.paused;
            pauseScreen.classList.toggle('show');
            pauseBtn.textContent = gameState.paused ? '▶' : '⏸';
        });

        resumeBtn.addEventListener('click', () => {
            gameState.paused = false;
            pauseScreen.classList.remove('show');
            pauseBtn.textContent = '⏸';
        });

        restartBtn2.addEventListener('click', () => {
            location.reload();
        });

        // Restart
        restartBtn.addEventListener('click', () => {
            location.reload();
        });

        // Game loop
        function gameLoop() {
            if (!gameState.paused && gameState.gameActive) {
                gameState.spawnCounter += SPAWN_RATE;
                if (gameState.spawnCounter >= 1) {
                    spawnRing();
                    gameState.spawnCounter = 0;
                }

                updateRings();
                checkMatches();

                if (gameState.comboDecayTimer > 0) {
                    gameState.comboDecayTimer--;
                } else {
                    gameState.combo = 0;
                }
            }

            scoreDisplay.textContent = `Score: ${gameState.score}`;
            requestAnimationFrame(gameLoop);
        }

        // Timer
        setInterval(() => {
            if (gameState.gameActive && !gameState.paused) {
                gameState.timeLeft--;
                timerDisplay.textContent = gameState.timeLeft;

                if (gameState.timeLeft <= 0) {
                    endGame();
                }
            }
        }, 1000);

        function endGame() {
            gameState.gameActive = false;
            finalScoreDisplay.textContent = `Score: ${gameState.score}`;
            levelReachedDisplay.textContent = `Level ${gameState.level}`;
            gameOverScreen.classList.add('show');
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
