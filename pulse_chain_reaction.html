
<style>
#pw{border-radius:12px;overflow:hidden;background:#07070f;cursor:crosshair;-webkit-user-select:none;user-select:none;touch-action:none;}
canvas{display:block;width:100%;}
#hud{display:flex;justify-content:space-between;padding:10px 18px 12px;pointer-events:none;}
.hv{font-size:20px;font-weight:500;color:#fff;text-align:center;}
.hl{font-size:11px;color:rgba(255,255,255,0.35);text-align:center;margin-top:2px;}
#gm{text-align:center;font-size:13px;color:var(--color-text-secondary);padding:8px 0 4px;}
#br{display:flex;gap:8px;justify-content:center;margin-top:8px;}
</style>

<h2 class="sr-only">Pulse — tap the dark field once to fire a sonar wave that blooms glowing seeds in a chain reaction.</h2>

<div id="pw">
  <canvas id="c"></canvas>
  <div id="hud">
    <div><div class="hv" id="hsc">0</div><div class="hl">score</div></div>
    <div><div class="hv" id="hpulse">1</div><div class="hl">pulse</div></div>
    <div><div class="hv" id="hact">0/0</div><div class="hl">bloomed</div></div>
  </div>
</div>
<div id="gm">tap anywhere to send your pulse</div>
<div id="br">
  <button onclick="newGame()">new puzzle</button>
  <button onclick="sendPrompt('I like the Pulse chain reaction game concept. Suggest new mechanics, seed types, level progression ideas, and visual themes to expand it.')">expand this ↗</button>
</div>

<script>
const cv=document.getElementById('c'), cx=cv.getContext('2d');
const SC=['#ED93B1','#85B7EB','#5DCAA5','#FAC775','#AFA9EC'];
let W,H,DPR,seeds=[],waves=[],particles=[],floaters=[];
let score=0,actCount=0,tapsLeft=1,state='ready',lastT=0,raf=null;

function resize(){
  DPR=window.devicePixelRatio||1;
  W=cv.offsetWidth;
  H=Math.round(Math.min(500,window.innerHeight*0.52));
  cv.style.height=H+'px';
  cv.width=Math.round(W*DPR);
  cv.height=Math.round(H*DPR);
  cx.scale(DPR,DPR);
  cx.fillStyle='#07070f';
  cx.fillRect(0,0,W,H);
}

function newGame(){
  resize();
  seeds=[];waves=[];particles=[];floaters=[];
  score=0;actCount=0;tapsLeft=1;state='ready';
  const n=16+Math.floor(Math.random()*8);
  for(let i=0;i<n;i++){
    seeds.push({
      id:i, x:28+Math.random()*(W-56), y:28+Math.random()*(H-56),
      r:6+Math.random()*10, col:SC[Math.floor(Math.random()*SC.length)],
      act:false, sc:1, pp:Math.random()*Math.PI*2
    });
  }
  hud('tap anywhere to send your pulse');
  if(!raf) raf=requestAnimationFrame(loop);
}

function loop(ts){
  const dt=Math.min((ts-lastT)/1000,0.05); lastT=ts;
  update(dt,ts*0.001);
  draw(ts*0.001);
  raf=requestAnimationFrame(loop);
}

function update(dt,t){
  for(const w of waves){ w.pr=w.r; w.r+=220*dt; w.a=Math.max(0,1-w.r/w.mx); }
  for(const w of waves){
    if(w.r<1) continue;
    for(const s of seeds){
      if(s.act) continue;
      const d=Math.hypot(s.x-w.x,s.y-w.y);
      if(d-s.r<=w.r && d+s.r>=w.pr && !w.hit.has(s.id)){
        w.hit.add(s.id); bloom(s);
      }
    }
  }
  waves=waves.filter(w=>w.r<w.mx);
  for(const p of particles){
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=55*dt;
    p.life-=dt/p.dur; p.r*=0.975;
  }
  particles=particles.filter(p=>p.life>0);
  for(const f of floaters){ f.y-=30*dt; f.life-=dt; }
  floaters=floaters.filter(f=>f.life>0);
  for(const s of seeds) if(s.act) s.sc=Math.max(0,s.sc-dt*3.5);
  if(state==='going'&&waves.length===0&&particles.length===0){
    state='done';
    const all=actCount===seeds.length;
    hud(all?'perfect bloom! tap for new puzzle':`${actCount}/${seeds.length} seeds — tap for new puzzle`);
  }
}

function bloom(s){
  s.act=true; actCount++; score+=10+actCount*8;
  for(let i=0;i<16;i++){
    const a=(i/16)*Math.PI*2+Math.random()*0.4, spd=60+Math.random()*120;
    particles.push({x:s.x,y:s.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      r:1.5+Math.random()*3,life:1,dur:0.45+Math.random()*0.5,col:s.col});
  }
  const mx=Math.max(W,H)*(0.3+Math.random()*0.25);
  waves.push({x:s.x,y:s.y,r:s.r,pr:0,mx,a:1,col:s.col,hit:new Set()});
  floaters.push({x:s.x,y:s.y-s.r-6,text:`+${actCount*8}`,life:0.9,col:s.col});
  hud();
}

function onTap(x,y){
  if(state==='done'){newGame();return;}
  if(tapsLeft<=0) return;
  tapsLeft--;state='going';
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2;
    particles.push({x,y,vx:Math.cos(a)*70,vy:Math.sin(a)*70,r:2.5,life:1,dur:0.3,col:'#fff'});
  }
  waves.push({x,y,r:0,pr:0,mx:Math.max(W,H)*1.15,a:1,col:'#fff',hit:new Set()});
  hud('chain in progress...');
}

function draw(t){
  cx.fillStyle='rgba(7,7,15,0.88)';
  cx.fillRect(0,0,W,H);

  for(const w of waves){
    if(w.r<1) continue;
    cx.globalAlpha=w.a*0.18;
    cx.beginPath();cx.arc(w.x,w.y,w.r+5,0,Math.PI*2);
    cx.strokeStyle=w.col;cx.lineWidth=9;cx.stroke();
    cx.globalAlpha=w.a*0.7;
    cx.beginPath();cx.arc(w.x,w.y,w.r,0,Math.PI*2);
    cx.strokeStyle=w.col;cx.lineWidth=1.5;cx.stroke();
    if(w.r>10){
      cx.globalAlpha=w.a*0.25;
      cx.beginPath();cx.arc(w.x,w.y,w.r-5,0,Math.PI*2);
      cx.strokeStyle=w.col;cx.lineWidth=0.75;cx.stroke();
    }
    cx.globalAlpha=1;
  }

  for(const s of seeds){
    if(s.sc<=0.02) continue;
    const pulse=s.act?0:Math.sin(t*1.9+s.pp)*0.09;
    const ar=s.r*s.sc*(1+pulse);
    cx.globalAlpha=0.05; cx.fillStyle=s.col;
    cx.beginPath();cx.arc(s.x,s.y,ar*3.2,0,Math.PI*2);cx.fill();
    cx.globalAlpha=0.12;
    cx.beginPath();cx.arc(s.x,s.y,ar*2,0,Math.PI*2);cx.fill();
    cx.globalAlpha=s.act?0.45*s.sc:0.88;
    cx.beginPath();cx.arc(s.x,s.y,ar,0,Math.PI*2);cx.fill();
    if(!s.act){
      cx.globalAlpha=0.32; cx.fillStyle='#fff';
      cx.beginPath();cx.arc(s.x-ar*0.22,s.y-ar*0.22,ar*0.32,0,Math.PI*2);cx.fill();
    }
    cx.globalAlpha=1;
  }

  for(const p of particles){
    cx.globalAlpha=Math.max(0,p.life)*0.88;
    cx.fillStyle=p.col;
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;

  cx.font='500 12px sans-serif'; cx.textAlign='center';
  for(const f of floaters){
    cx.globalAlpha=Math.min(1,f.life*1.4);
    cx.fillStyle=f.col;
    cx.fillText(f.text,f.x,f.y);
  }
  cx.globalAlpha=1; cx.textAlign='start';
}

function hud(msg){
  document.getElementById('hsc').textContent=score;
  document.getElementById('hpulse').textContent=tapsLeft;
  document.getElementById('hact').textContent=actCount+'/'+(seeds.length||'?');
  if(msg) document.getElementById('gm').textContent=msg;
}

cv.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  onTap(e.clientX-r.left,e.clientY-r.top);
},{passive:false});

window.addEventListener('resize',()=>{newGame();});
newGame();
</script>
